services:
  - type: web
    name: vgmf-fellowship-portal
    runtime: node
    plan: free
    region: oregon
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npx prisma db push && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        value: https://fellowship.vaidyagogate.org
      - key: KEEPALIVE_URL
        value: https://fellowship.vaidyagogate.org/api/health
      - key: KEEPALIVE_URLS
        value: https://fellowship.vaidyagogate.org/api/health,https://fellowship.vaidyagogate.org/robots.txt,https://fellowship.vaidyagogate.org/sitemap.xml,https://fellowship.vaidyagogate.org/
      - key: KEEPALIVE_INTERVAL_MS
        value: "30000"
      - key: SEO_INDEXING_ENABLED
        value: "true"
      - key: SELF_KEEPALIVE_ENABLED
        value: "true"
      - key: ZEPTOMAIL_TOKEN
        sync: false
      - key: ZEPTOMAIL_FROM_EMAIL
        sync: false
      - key: ZEPTOMAIL_FROM_NAME
        value: VGMF Fellowship Portal
      - key: ZEPTOMAIL_API_URL
        value: https://api.zeptomail.in/v1.1/email
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: WHATSAPP_OTP_TEMPLATE_NAME
        value: vgmf_otp_auth
      - key: WHATSAPP_OTP_TEMPLATE_LANGUAGE
        value: en
      - key: GOOGLE_SITE_VERIFICATION
        sync: false
      - key: NEXT_PUBLIC_GA_MEASUREMENT_ID
        sync: false
      - key: R2_ACCOUNT_ID
        value: f664e5b07a50cfc2893ae0821a408b88
      - key: R2_BUCKET_NAME
        value: fellowship
      - key: R2_ENDPOINT
        value: https://f664e5b07a50cfc2893ae0821a408b88.r2.cloudflarestorage.com
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false

  # Wakes the web service before Render free-tier idle sleep (~15 min).
  # IMPORTANT: After deploy, confirm this cron exists in Render Dashboard → Cron Jobs.
  - type: cron
    name: fellowship-keepalive
    runtime: node
    plan: free
    region: oregon
    schedule: "*/5 * * * *"
    buildCommand: echo "keepalive cron — no build"
    startCommand: node scripts/render-cron-ping.mjs
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: KEEPALIVE_URLS
        value: https://fellowship.vaidyagogate.org/api/health,https://fellowship.vaidyagogate.org/robots.txt,https://fellowship.vaidyagogate.org/sitemap.xml,https://fellowship.vaidyagogate.org/
